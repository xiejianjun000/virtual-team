# 当 Issue 或 PR 长时间没有活动时自动标记为 stale
name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '30 1 * * *'  # 每天 UTC 17:30 (北京时间 01:30)
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close-stale: 7
          stale-issue-label: 'stale'
          stale-issue-message: '此 Issue 已标记为 stale，因为它在 60 天内没有新活动。'
          close-issue-message: '此 Issue 因长时间无响应而关闭。'
          days-before-stale: 30
          stale-pr-label: 'stale'
          stale-pr-message: '此 PR 已标记为 stale，因为它在 30 天内没有新活动。'
          close-pr-message: '此 PR 因长时间无响应而关闭。'
          exempt-issue-labels: 'pinned,security,planned'
          exempt-pr-labels: 'pinned,security,planned'
